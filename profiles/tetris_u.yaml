game: tetris
system: nes
poll_seconds: 0.10

fields:

  random_seed:             { addr: 0x0017, type: u16, endian: little }
  last_next_piece_id:      { addr: 0x0019, type: u8 }
  pieces_this_poweron:     { addr: 0x001A, type: u8 }

  cur_piece_x:             { addr: 0x0040, type: u8 }
  cur_piece_y:             { addr: 0x0041, type: u8 }
  cur_piece_id:            { addr: 0x0042, type: u8 }
  current_speed_level:     { addr: 0x0044, type: u8 }
  fall_timer:              { addr: 0x0045, type: u8 }
  lr_autorepeat_timer:     { addr: 0x0046, type: u8 }
  starting_speed_level:    { addr: 0x0047, type: u8 }
  game_phase:              { addr: 0x0048, type: u8 }

  line_clear_anim_counter: { addr: 0x0052, type: u8 }
  lines_bcd:               { addr: 0x0050, type: u16, endian: little }
  score_bcd_lo:            { addr: 0x0053, type: u8 }
  score_bcd_mid:           { addr: 0x0054, type: u8 }
  score_bcd_hi:            { addr: 0x0055, type: u8 }
  lines_being_cleared:     { addr: 0x0056, type: u8 }
  game_over_animation:     { addr: 0x0058, type: u8 }
  b_type_height_level:     { addr: 0x0059, type: u8 }

  demo_time:               { addr: 0x00B1, type: u16, endian: little }
  buttons_pressed:         { addr: 0x00B5, type: u8 }
  buttons_state:           { addr: 0x00B6, type: u8 }
  playfield_base_addr:     { addr: 0x00B8, type: u16, endian: little }
  number_of_players:       { addr: 0x00BE, type: u8 }
  next_piece_id:           { addr: 0x00BF, type: u8 }
  game_type:               { addr: 0x00C1, type: u8 }
  music_type:              { addr: 0x00C2, type: u8 }

  controller1_pressed:     { addr: 0x00F5, type: u8 }
  controller1_state:       { addr: 0x00F7, type: u8 }

  t_count_bcd:             { addr: 0x03F0, type: u16, endian: little }
  j_count_bcd:             { addr: 0x03F2, type: u16, endian: little }
  z_count_bcd:             { addr: 0x03F4, type: u16, endian: little }
  o_count_bcd:             { addr: 0x03F6, type: u16, endian: little }
  s_count_bcd:             { addr: 0x03F8, type: u16, endian: little }
  l_count_bcd:             { addr: 0x03FA, type: u16, endian: little }
  i_count_bcd:             { addr: 0x03FC, type: u16, endian: little }
